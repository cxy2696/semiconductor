name: Update Dashboard Every 5 Minutes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: refresh-dashboard-5m
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard artifacts
        env:
          CI: "true"
          OPEN_REPORT: "0"
        run: python china_semiconductor_report.py

      - name: Commit and push updates if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh dashboard data and docs"
          file_pattern: "docs/index.html docs/app.js docs/latest_data.json docs/.nojekyll"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
