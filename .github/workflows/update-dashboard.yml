name: Refresh Dashboard Every Hour

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-dashboard.yml"
      - "china_semiconductor_report.py"
      - "config/**"
      - "scripts/**"
      - "html_template.html"
      - "app.js"
      - "dashboard.js"
      - "styles.css"
      - "requirements.txt"
  workflow_dispatch:

concurrency:
  group: refresh-dashboard-hourly
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard artifacts via refresh script
        env:
          CI: "true"
          OPEN_REPORT: "0"
          KEEP_LOCAL_ARTIFACTS: "0"
          INTERVAL_SECONDS: "3600"
          PYTHON_BIN: "python"
          REFRESH_RETRIES: "2"
        run: bash ./scripts/refresh_dashboard.sh --once

      - name: Validate generated artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import urlparse

          docs_dir = Path("docs")
          index_path = docs_dir / "index.html"
          required_pages = [
              docs_dir / "overview.html",
              docs_dir / "charts.html",
              docs_dir / "knowledge.html",
              docs_dir / "risk-news.html",
              docs_dir / "data-center.html",
          ]
          payload_path = docs_dir / "latest_data.json"
          if not index_path.exists():
              raise SystemExit("docs/index.html was not generated")
          missing_pages = [str(p) for p in required_pages if not p.exists()]
          if missing_pages:
              raise SystemExit(f"Missing generated module pages: {missing_pages}")
          if not payload_path.exists():
              raise SystemExit("docs/latest_data.json was not generated")

          payload = json.loads(payload_path.read_text(encoding="utf-8"))
          required_keys = [
              "data",
              "news_pool",
              "kline_data",
              "industry_intro",
              "industry_basics",
              "industry_source_refs",
              "industry_intro_source",
              "data_time_iso",
          ]
          missing = [k for k in required_keys if k not in payload]
          if missing:
              raise SystemExit(f"Missing keys in latest_data.json: {missing}")
          if not isinstance(payload["data"], list) or not payload["data"]:
              raise SystemExit("latest_data.json:data is empty or invalid")
          if not isinstance(payload["news_pool"], list):
              raise SystemExit("latest_data.json:news_pool is invalid")
          news_pool = payload["news_pool"]
          if not news_pool:
              raise SystemExit("latest_data.json:news_pool is empty (scraping may have failed)")
          valid_news_links = [
              item.get("link", "")
              for item in news_pool
              if urlparse(str(item.get("link", ""))).scheme in {"http", "https"}
          ]
          if len(valid_news_links) < 5:
              raise SystemExit(
                  f"Insufficient valid external news links: {len(valid_news_links)}"
              )

          industry_intro = payload.get("industry_intro", [])
          industry_basics = payload.get("industry_basics", [])
          MIN_INDUSTRY_BASICS = 4
          if not isinstance(industry_intro, list) or not isinstance(industry_basics, list):
              raise SystemExit("industry_intro/industry_basics must be lists")
          if len(industry_intro) < 1 or len(industry_basics) < MIN_INDUSTRY_BASICS:
              raise SystemExit(
                  f"Industry scraping data too small: intro={len(industry_intro)}, basics={len(industry_basics)} (min basics={MIN_INDUSTRY_BASICS})"
              )

          refs = payload.get("industry_source_refs", [])
          if not isinstance(refs, list) or not refs:
              raise SystemExit("industry_source_refs is empty (no external source recorded for industry terms)")
          valid_ref_links = [
              ref.get("url", "")
              for ref in refs
              if urlparse(str(ref.get("url", ""))).scheme in {"http", "https"}
          ]
          if not valid_ref_links:
              raise SystemExit("industry_source_refs has no valid external URLs for industry terms")
          print("Artifact validation passed.")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
