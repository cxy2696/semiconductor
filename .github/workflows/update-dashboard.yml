name: Update Dashboard Every 10 Minutes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: refresh-dashboard-10m
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard artifacts via refresh script
        env:
          CI: "true"
          OPEN_REPORT: "0"
          RUN_ONCE: "1"
        run: bash ./refresh_report_every_5m.sh --once

      - name: Commit and push updates if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh dashboard data and docs"
          file_pattern: "docs/index.html docs/app.js docs/dashboard.js docs/styles.css docs/latest_data.json docs/.nojekyll"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
