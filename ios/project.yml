name: SemiconductorApp
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.cxy2696.semiconductorapp
targets:
  SemiconductorApp:
    type: application
    platform: iOS
    sources:
      - SemiconductorApp
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_CFBundleDisplayName: Semiconductor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
  SemiconductorAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SemiconductorAppTests
    dependencies:
      - target: SemiconductorApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  SemiconductorAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SemiconductorAppUITests
    dependencies:
      - target: SemiconductorApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
